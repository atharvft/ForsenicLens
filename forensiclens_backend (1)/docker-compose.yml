version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: forensiclens_db
    environment:
      POSTGRES_USER: forensiclens
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: forensiclens_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forensiclens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: .
    container_name: forensiclens_api
    environment:
      - DATABASE_URL=postgresql://forensiclens:password123@db:5432/forensiclens_db
      - SECRET_KEY=your-secret-key-change-in-production
      - USE_GPU=False  # Set to True if running on GPU-enabled host
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forensiclens_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forensiclens.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
